<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Records Drill Down Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Brand Colors */
            --veeva-blue: #1453b8;
            --veeva-blue-hover: #0f4092;
            --veeva-orange: #f8972b;
            --vault-header-bg: #061937;
            
            /* UI Colors */
            --text-main: #1d1d1d;
            --text-muted: #808080;
            --border-color: #e5e7eb;
            --sidebar-bg: #f8f8f8;
            --grid-header-bg: #c0c0c0;
            --page-bg: #ffffff;
        }
        body {
            font-family: 'Roboto', sans-serif;
            color: var(--text-main);
            background-color: var(--page-bg);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .btn-primary {
            background-color: var(--veeva-blue);
            color: white;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            font-size: 14px;
            font-weight: 500;
            padding: 6px 16px;
            cursor: pointer;
            border: none;
        }
        .btn-primary:hover {
            background-color: var(--veeva-blue-hover);
        }
        .btn-secondary {
            background-color: white;
            border: 1px solid #dadada;
            color: var(--text-main);
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            font-size: 14px;
            font-weight: 500;
            padding: 6px 16px;
            cursor: pointer;
        }
        .btn-secondary:hover {
            background-color: #f9fafb;
        }
        
        /* Grid Styles */
        .grid-header {
            background-color: var(--grid-header-bg);
            color: var(--text-main);
            font-weight: bold;
            font-size: 12px;
            border-bottom: 1px solid #a0a0a0;
            border-right: 1px solid #a0a0a0;
            padding: 8px;
            position: relative;
            cursor: pointer;
            user-select: none;
            vertical-align: top;
        }
        .grid-cell {
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            background-color: white;
            padding: 8px;
            font-size: 13px;
        }
        .grid-row:hover .grid-cell {
            background-color: #f9fafb;
        }
        
        /* Filter Popover */
        .filter-popover {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 8px;
            z-index: 10;
            min-width: 150px;
            cursor: default;
        }
        .filter-popover.active {
            display: block;
        }
        
        /* Basic SVG icons */
        .icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <!-- Global Header -->
    <header class="h-[88px] flex flex-col shrink-0">
        <!-- Top Row -->
        <div class="h-[48px] bg-[var(--vault-header-bg)] flex items-center justify-between px-4">
            <div class="text-white font-bold text-lg flex items-center gap-2">
                <span class="text-[var(--veeva-orange)]">Veeva</span> Vault
            </div>
            <div class="flex-1 max-w-md mx-4">
                <div class="bg-white rounded flex items-center h-8 px-2">
                    <span class="text-gray-500 text-sm mr-2 border-r pr-2 border-gray-300">All ▼</span>
                    <input type="text" placeholder="Search" class="flex-1 outline-none text-sm px-2" />
                    <svg class="icon text-gray-400" viewBox="0 0 24 24"><path d="M10,18A8,8 0 1,1 18,10A8,8 0 0,1 10,18M10,16A6,6 0 1,0 16,10A6,6 0 0,0 10,16M21.71,20.29L18,16.61C19.24,14.93 20,12.56 20,10A10,10 0 1,0 10,20C12.56,20 14.93,19.24 16.61,18L20.29,21.71A1,1 0 0,0 21.71,20.29Z" /></svg>
                </div>
            </div>
            <div class="flex items-center gap-4 text-white">
                <svg class="icon" viewBox="0 0 24 24"><path d="M12,22A2,2 0 0,0 14,20H10A2,2 0 0,0 12,22M18,16V11C18,7.93 16.36,5.36 13.5,4.68V4A1.5,1.5 0 0,0 12,2.5A1.5,1.5 0 0,0 10.5,4V4.68C7.63,5.36 6,7.92 6,11V16L4,18V19H20V18L18,16Z" /></svg>
                <div class="w-8 h-8 rounded-full bg-gray-400 flex items-center justify-center text-xs text-white">AK</div>
            </div>
        </div>
        <!-- Tabs Row -->
        <div class="h-[40px] bg-[var(--sidebar-bg)] flex items-end px-4 border-b border-[var(--border-color)] justify-between">
            <div class="flex gap-1 h-full">
                <div class="px-4 py-2 text-[14px] text-[#1d1d1d] hover:bg-[#eee] cursor-pointer">Home</div>
                <div class="px-4 py-2 text-[14px] text-[#1d1d1d] hover:bg-[#eee] cursor-pointer">Library</div>
                <div class="px-4 py-2 text-[14px] bg-white border-b-4 border-[var(--veeva-orange)] font-bold cursor-pointer">Records</div>
                <div class="px-4 py-2 text-[14px] text-[#1d1d1d] hover:bg-[#eee] cursor-pointer">Reports</div>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-[261px] bg-[var(--sidebar-bg)] border-r border-[#eee] flex flex-col">
            <div class="p-4 text-[14px] uppercase font-bold text-gray-600 flex items-center gap-2">
                <svg class="icon" viewBox="0 0 24 24"><path d="M7,10L12,15L17,10H7Z" /></svg> VIEWS
            </div>
            <div class="flex flex-col">
                <div class="h-[32px] px-[34px] text-[12px] flex items-center gap-2 bg-white border-l-4 border-[var(--veeva-orange)] font-bold text-[#1d1d1d]">
                    All Records
                </div>
                <div class="h-[32px] px-[34px] text-[12px] flex items-center gap-2 text-gray-600 hover:text-[#1d1d1d] hover:bg-white cursor-pointer">
                    Recent Records
                </div>
                <div class="h-[32px] px-[34px] text-[12px] flex items-center gap-2 text-gray-600 hover:text-[#1d1d1d] hover:bg-white cursor-pointer">
                    Favorites
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="flex-1 flex flex-col bg-[var(--page-bg)]">
            <!-- Page Header -->
            <div class="h-[56px] border-b-2 border-[var(--veeva-orange)] flex items-center justify-between px-6 shrink-0">
                <h1 class="text-[20px] text-[#1d1d1d] font-semibold">Records</h1>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-500 font-medium" id="record-count">1-5 of 5</span>
                    <button class="btn-secondary">Save View As</button>
                    <button class="btn-primary">Create</button>
                </div>
            </div>

            <!-- Data Grid Container -->
            <div class="flex-1 overflow-auto p-4">
                <div class="border border-[var(--border-color)] bg-white inline-block min-w-full shadow-sm">
                    <table class="w-full text-left border-collapse" style="table-layout: fixed;">
                        <thead>
                            <tr>
                                <th class="grid-header w-[150px]" onclick="handleSort('id')">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center gap-1">
                                            ID <span id="sort-icon-id" class="text-xs text-gray-500 w-3"></span>
                                        </div>
                                        <div class="text-gray-500 hover:text-black p-1 rounded hover:bg-gray-200" onclick="toggleFilter(event, 'id')" title="Filter">
                                            <svg class="icon" viewBox="0 0 24 24"><path d="M14,12V19.88C14.04,20.18 13.94,20.5 13.71,20.71C13.32,21.1 12.69,21.1 12.3,20.71L10.29,18.7C10.06,18.47 9.96,18.16 10,17.87V12H9.97L4.21,4.62C3.87,4.19 3.95,3.56 4.38,3.22C4.57,3.08 4.78,3 5,3V3H19V3C19.22,3 19.43,3.08 19.62,3.22C20.05,3.56 20.13,4.19 19.79,4.62L14.03,12H14Z" /></svg>
                                        </div>
                                    </div>
                                    <div id="filter-id" class="filter-popover font-normal" onclick="event.stopPropagation()">
                                        <div class="text-xs mb-1 font-semibold text-gray-700">Filter by ID:</div>
                                        <input type="text" id="input-filter-id" placeholder="Contains..." class="w-full border p-1 text-xs mb-1 outline-none focus:border-blue-500" onkeyup="applyFilters()">
                                    </div>
                                </th>
                                <th class="grid-header w-[250px]" onclick="handleSort('name')">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center gap-1">
                                            Name <span id="sort-icon-name" class="text-xs text-gray-500 w-3"></span>
                                        </div>
                                        <div class="text-gray-500 hover:text-black p-1 rounded hover:bg-gray-200" onclick="toggleFilter(event, 'name')" title="Filter">
                                            <svg class="icon" viewBox="0 0 24 24"><path d="M14,12V19.88C14.04,20.18 13.94,20.5 13.71,20.71C13.32,21.1 12.69,21.1 12.3,20.71L10.29,18.7C10.06,18.47 9.96,18.16 10,17.87V12H9.97L4.21,4.62C3.87,4.19 3.95,3.56 4.38,3.22C4.57,3.08 4.78,3 5,3V3H19V3C19.22,3 19.43,3.08 19.62,3.22C20.05,3.56 20.13,4.19 19.79,4.62L14.03,12H14Z" /></svg>
                                        </div>
                                    </div>
                                    <div id="filter-name" class="filter-popover font-normal" onclick="event.stopPropagation()">
                                        <div class="text-xs mb-1 font-semibold text-gray-700">Filter by Name:</div>
                                        <input type="text" id="input-filter-name" placeholder="Contains..." class="w-full border p-1 text-xs mb-1 outline-none focus:border-blue-500" onkeyup="applyFilters()">
                                    </div>
                                </th>
                                <th class="grid-header w-[150px]" onclick="handleSort('status')">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center gap-1">
                                            Status <span id="sort-icon-status" class="text-xs text-gray-500 w-3"></span>
                                        </div>
                                        <div class="text-gray-500 hover:text-black p-1 rounded hover:bg-gray-200" onclick="toggleFilter(event, 'status')" title="Filter">
                                            <svg class="icon" viewBox="0 0 24 24"><path d="M14,12V19.88C14.04,20.18 13.94,20.5 13.71,20.71C13.32,21.1 12.69,21.1 12.3,20.71L10.29,18.7C10.06,18.47 9.96,18.16 10,17.87V12H9.97L4.21,4.62C3.87,4.19 3.95,3.56 4.38,3.22C4.57,3.08 4.78,3 5,3V3H19V3C19.22,3 19.43,3.08 19.62,3.22C20.05,3.56 20.13,4.19 19.79,4.62L14.03,12H14Z" /></svg>
                                        </div>
                                    </div>
                                    <div id="filter-status" class="filter-popover font-normal" onclick="event.stopPropagation()">
                                        <div class="text-xs mb-1 font-semibold text-gray-700">Filter by Status:</div>
                                        <select id="select-filter-status" class="w-full border p-1 text-xs mb-1 outline-none focus:border-blue-500" onchange="applyFilters()">
                                            <option value="">All</option>
                                            <option value="Active">Active</option>
                                            <option value="Draft">Draft</option>
                                            <option value="Closed">Closed</option>
                                            <option value="In Review">In Review</option>
                                        </select>
                                    </div>
                                </th>
                                <th class="grid-header w-[200px]" onclick="handleSort('date')">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center gap-1">
                                            Last Modified <span id="sort-icon-date" class="text-xs text-gray-500 w-3"></span>
                                        </div>
                                        <div class="text-gray-500 hover:text-black p-1 rounded hover:bg-gray-200" onclick="toggleFilter(event, 'date')" title="Filter">
                                            <svg class="icon" viewBox="0 0 24 24"><path d="M14,12V19.88C14.04,20.18 13.94,20.5 13.71,20.71C13.32,21.1 12.69,21.1 12.3,20.71L10.29,18.7C10.06,18.47 9.96,18.16 10,17.87V12H9.97L4.21,4.62C3.87,4.19 3.95,3.56 4.38,3.22C4.57,3.08 4.78,3 5,3V3H19V3C19.22,3 19.43,3.08 19.62,3.22C20.05,3.56 20.13,4.19 19.79,4.62L14.03,12H14Z" /></svg>
                                        </div>
                                    </div>
                                    <div id="filter-date" class="filter-popover font-normal" onclick="event.stopPropagation()">
                                        <div class="text-xs mb-1 font-semibold text-gray-700">Filter by Date:</div>
                                        <input type="text" id="input-filter-date" placeholder="YYYY-MM-DD" class="w-full border p-1 text-xs mb-1 outline-none focus:border-blue-500" onkeyup="applyFilters()">
                                    </div>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="grid-body">
                            <!-- Rows will be injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const initialData = [
            { id: "REC-001", name: "Clinical Study Phase III", status: "Active", date: "2025-12-01" },
            { id: "REC-002", name: "Investigator Brochure Draft", status: "Draft", date: "2025-12-05" },
            { id: "REC-003", name: "Site Selection Form", status: "Closed", date: "2025-11-20" },
            { id: "REC-004", name: "Protocol Amendment 2", status: "Active", date: "2025-12-08" },
            { id: "REC-005", name: "Patient Consent Form V1", status: "Draft", date: "2025-12-09" },
            { id: "REC-006", name: "Safety Update Report", status: "In Review", date: "2025-12-10" },
            { id: "REC-007", name: "Vendor Contract", status: "Closed", date: "2025-10-15" }
        ];

        let currentData = [...initialData];
        let sortCol = null;
        let sortAsc = true;

        const tbody = document.getElementById('grid-body');
        const recordCount = document.getElementById('record-count');

        function renderGrid(data) {
            tbody.innerHTML = '';
            if (data.length === 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td colspan="4" class="p-8 text-center text-gray-500 text-sm">No records found matching filters.</td>`;
                tbody.appendChild(tr);
            } else {
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.className = 'grid-row';
                    tr.innerHTML = `
                        <td class="grid-cell text-blue-600 hover:underline cursor-pointer">${row.id}</td>
                        <td class="grid-cell">${row.name}</td>
                        <td class="grid-cell">${row.status}</td>
                        <td class="grid-cell">${row.date}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            recordCount.innerText = data.length > 0 ? `1-${data.length} of ${data.length}` : `0 of 0`;
            updateSortIcons();
        }

        function handleSort(col) {
            if (sortCol === col) {
                sortAsc = !sortAsc;
            } else {
                sortCol = col;
                sortAsc = true;
            }
            
            currentData.sort((a, b) => {
                let valA = a[col].toLowerCase();
                let valB = b[col].toLowerCase();
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
            
            renderGrid(currentData);
        }

        function updateSortIcons() {
            ['id', 'name', 'status', 'date'].forEach(col => {
                const iconSpan = document.getElementById(`sort-icon-${col}`);
                if (iconSpan) {
                    if (sortCol === col) {
                        iconSpan.innerText = sortAsc ? '▲' : '▼';
                    } else {
                        iconSpan.innerText = '';
                    }
                }
            });
        }

        function toggleFilter(event, col) {
            event.stopPropagation(); // prevent sort from firing
            const popover = document.getElementById(`filter-${col}`);
            
            // Toggle current
            const isActive = popover.classList.contains('active');
            
            // Close all
            document.querySelectorAll('.filter-popover').forEach(el => {
                el.classList.remove('active');
            });
            
            if (!isActive) {
                popover.classList.add('active');
                // Focus the input if it's a text input
                const input = popover.querySelector('input');
                if(input) input.focus();
            }
        }

        function applyFilters() {
            const filterId = document.getElementById('input-filter-id').value.toLowerCase();
            const filterName = document.getElementById('input-filter-name').value.toLowerCase();
            const filterStatus = document.getElementById('select-filter-status').value.toLowerCase();
            const filterDate = document.getElementById('input-filter-date').value.toLowerCase();

            currentData = initialData.filter(row => {
                return row.id.toLowerCase().includes(filterId) &&
                       row.name.toLowerCase().includes(filterName) &&
                       (filterStatus === "" || row.status.toLowerCase() === filterStatus) &&
                       row.date.toLowerCase().includes(filterDate);
            });

            if (sortCol) {
                currentData.sort((a, b) => {
                    let valA = a[sortCol].toLowerCase();
                    let valB = b[sortCol].toLowerCase();
                    if (valA < valB) return sortAsc ? -1 : 1;
                    if (valA > valB) return sortAsc ? 1 : -1;
                    return 0;
                });
            }

            renderGrid(currentData);
        }

        // Close popovers when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.filter-popover') && !e.target.closest('.grid-header')) {
                document.querySelectorAll('.filter-popover').forEach(el => {
                    el.classList.remove('active');
                });
            }
        });

        // Initial render
        renderGrid(currentData);
    </script>
</body>
</html>
